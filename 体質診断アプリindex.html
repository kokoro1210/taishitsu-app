    // --- アコーディオンコンポーネント ---
    const Accordion = ({ data }) => {
      const [isOpen, setIsOpen] = useState(false);
      return (
        <div className="mt-4 border border-green-200 rounded-lg overflow-hidden bg-white shadow-sm">
          <button 
            onClick={() => setIsOpen(!isOpen)} 
            className="w-full text-left p-4 bg-green-50/50 hover:bg-green-50 flex justify-between items-center transition-colors"
          >
            <span className="text-green-800 font-medium text-sm">詳しく知りたい方はこちら</span>
            <ChevronDown size={20} className={`text-green-700 transform transition-transform duration-300 ${isOpen ? 'rotate-180' : ''}`} />
          </button>
          {isOpen && (
            <div className="p-4 border-t border-green-100 text-sm leading-relaxed text-gray-700 space-y-4 animate-in slide-in-from-top-2 duration-300">
              <p>{data.detail}</p>
              {data.benefit && (
                <div className="bg-orange-50 p-3 rounded-md">
                  <p className="font-bold text-orange-800 mb-1">【あなたの体質のメリット】</p>
                  <p className="text-orange-900">{data.benefit}</p>
                </div>
              )}
            </div>
          )}
        </div>
      );
    };

    // --- スコアバーコンポーネント ---
    const ScoreBar = ({ score, min, max, leftLabel, rightLabel, centerLabel, leftColor, rightColor }) => {
      const clampedScore = Math.min(Math.max(score, min), max);
      const percentage = ((clampedScore - min) / (max - min)) * 100;

      return (
        <div className="my-6 px-2">
          <div className="flex justify-between text-xs text-gray-500 font-medium mb-2">
            <span className="w-16 text-left">{leftLabel}</span>
            <span className="w-16 text-center">{centerLabel}</span>
            <span className="w-16 text-right">{rightLabel}</span>
          </div>
          <div className="relative h-3 bg-gray-200 rounded-full">
            <div 
              className="absolute top-0 bottom-0 left-0 right-0 rounded-full opacity-60" 
              style={{ background: `linear-gradient(to right, ${leftColor}, #e5e7eb, ${rightColor})` }}
            ></div>
            <div className="absolute top-0 bottom-0 left-1/2 w-px bg-gray-400"></div>
            <div
              className="absolute top-1/2 -mt-2.5 h-5 w-5 bg-white rounded-full shadow-md border-2 border-green-600 transition-all duration-500 ease-out z-10"
              style={{ left: `calc(${percentage}% - 10px)` }}
            ></div>
          </div>
        </div>
      );
    };

    // --- メインアプリケーション ---
    function App() {
      const [step, setStep] = useState('start');
      const [currentIndex, setCurrentIndex] = useState(0);
      const [answers, setAnswers] = useState({});
      const [multiSelections, setMultiSelections] = useState([]);

      const handleStart = () => {
        setAnswers({});
        setCurrentIndex(0);
        setMultiSelections([]);
        setStep('question');
      };

      const handleBack = () => {
        if (currentIndex > 0) {
          setCurrentIndex(currentIndex - 1);
          const prevQ = questions[currentIndex - 1];
          if (prevQ.category === 'kiketsusui') {
            setMultiSelections(answers[currentIndex - 1] || []);
          }
        }
      };

      const handleScaleAnswer = (score) => {
        setAnswers({ ...answers, [currentIndex]: score });
        if (currentIndex < questions.length - 1) {
          setCurrentIndex(currentIndex + 1);
        } else {
          calculateResult();
        }
      };

      const toggleMultiSelectionByIndex = (index, key) => {
        if (key === 'none') {
          setMultiSelections([{ index, key }]);
          return;
        }

        let newSelections = [...multiSelections];
        newSelections = newSelections.filter(item => item.key !== 'none');

        const exists = newSelections.find(item => item.index === index);
        if (exists) {
          newSelections = newSelections.filter(item => item.index !== index);
        } else {
          newSelections.push({ index, key });
        }
        setMultiSelections(newSelections);
      };

      const handleMultiSubmit = () => {
        const keys = multiSelections.map(item => item.key).filter(k => k !== 'none');
        setAnswers({ ...answers, [currentIndex]: keys });
        setMultiSelections([]);

        if (currentIndex < questions.length - 1) {
          setCurrentIndex(currentIndex + 1);
        } else {
          calculateResult();
        }
      };

      const [result, setResult] = useState(null);

      const calculateResult = () => {
        let kyojitsuScore = 0;
        let kannetsuScore = 0;
        const kiketsusuiCounts = {};

        questions.forEach((q, index) => {
          const ans = answers[index];
          if (ans === undefined) return;

          if (q.category === 'kyojitsu') {
            kyojitsuScore += (q.scale === 'positive' ? ans : -ans);
          } else if (q.category === 'kannetsu') {
            kannetsuScore += (q.scale === 'positive' ? ans : -ans);
          } else if (q.category === 'kiketsusui') {
            ans.forEach(key => {
              kiketsusuiCounts[key] = (kiketsusuiCounts[key] || 0) + 1;
            });
          }
        });

        let kyojitsuType = 'chukan';
        if (kyojitsuScore >= 6) kyojitsuType = 'jitsu';
        else if (kyojitsuScore <= -6) kyojitsuType = 'kyo';

        let kannetsuType = 'hei';
        if (kannetsuScore >= 4) kannetsuType = 'netsu';
        else if (kannetsuScore <= -4) kannetsuType = 'kan';

        setResult({
          kyojitsu: { score: kyojitsuScore, type: kyojitsuType },
          kannetsu: { score: kannetsuScore, type: kannetsuType },
          kiketsusui: kiketsusuiCounts
        });
        setStep('result');
      };

      if (step === 'start') {
        return (
          <div className="min-h-screen bg-[#f9f8f4] flex flex-col items-center justify-center p-6 font-sans">
            <div className="max-w-md w-full bg-white rounded-2xl shadow-sm p-8 text-center border border-[#e8e6df]">
              <h1 className="text-3xl font-bold text-green-800 mb-4 tracking-wider">体質診断</h1>
              <p className="text-gray-600 mb-8 text-sm leading-relaxed">
                15個の簡単な質問に答えて、<br />あなたの現在の体質（証）をチェックしましょう。
              </p>
              <button 
                onClick={handleStart}
                className="w-full bg-green-700 hover:bg-green-800 text-white font-bold py-4 rounded-xl transition-colors shadow-md"
              >
                診断をはじめる
              </button>
            </div>
          </div>
        );
      }

      if (step === 'question') {
        const currentQ = questions[currentIndex];
        const progress = ((currentIndex) / questions.length) * 100;

        return (
          <div className="min-h-screen bg-[#f9f8f4] flex flex-col items-center py-10 px-4 font-sans">
            <div className="max-w-md w-full">
              <div className="mb-8">
                <div className="flex justify-between items-center mb-2">
                  {currentIndex > 0 ? (
                    <button onClick={handleBack} className="flex items-center text-gray-500 hover:text-gray-800 text-sm p-1">
                      <ArrowLeft size={16} className="mr-1" /> 戻る
                    </button>
                  ) : <div className="w-16"></div>}
                  <span className="text-sm font-bold text-gray-500 tracking-widest">
                    {currentIndex + 1} <span className="text-gray-300 mx-1">/</span> {questions.length}
                  </span>
                  <div className="w-16"></div>
                </div>
                <div className="w-full bg-gray-200 h-1.5 rounded-full overflow-hidden">
                  <div 
                    className="bg-green-600 h-full transition-all duration-300 ease-out"
                    style={{ width: `${progress}%` }}
                  ></div>
                </div>
              </div>

              <div className="bg-white rounded-2xl shadow-sm p-6 sm:p-8 border border-[#e8e6df] min-h-[400px] flex flex-col">
                <h2 className="text-lg sm:text-xl font-bold text-gray-800 mb-8 leading-relaxed">
                  {currentQ.text}
                </h2>

                <div className="flex-grow flex flex-col justify-center space-y-3">
                  {currentQ.category === 'kiketsusui' ? (
                    <>
                      {currentQ.options.map((opt, i) => {
                        const isSelected = multiSelections.some(item => item.index === i);
                        return (
                          <button
                            key={i}
                            onClick={() => toggleMultiSelectionByIndex(i, opt.key)}
                            className={`flex items-center text-left w-full p-4 rounded-xl border-2 transition-all ${
                              isSelected 
                                ? 'border-green-600 bg-green-50' 
                                : 'border-gray-100 bg-gray-50 hover:bg-gray-100 hover:border-gray-200'
                            }`}
                          >
                            <div className={`w-5 h-5 rounded border flex items-center justify-center mr-3 flex-shrink-0 ${
                              isSelected ? 'bg-green-600 border-green-600' : 'border-gray-300 bg-white'
                            }`}>
                              {isSelected && <Check size={14} className="text-white" />}
                            </div>
                            <span className={`text-sm sm:text-base ${isSelected ? 'text-green-900 font-medium' : 'text-gray-700'}`}>
                              {opt.label}
                            </span>
                          </button>
                        );
                      })}
                      <div className="pt-6 mt-auto">
                        <button 
                          onClick={handleMultiSubmit}
                          disabled={multiSelections.length === 0}
                          className={`w-full py-4 rounded-xl font-bold transition-colors ${
                            multiSelections.length > 0 
                              ? 'bg-green-700 hover:bg-green-800 text-white shadow-md' 
                              : 'bg-gray-200 text-gray-400 cursor-not-allowed'
                          }`}
                        >
                          次へ
                        </button>
                      </div>
                    </>
                  ) : (
                    fiveScaleOptions.map((opt, i) => (
                      <button
                        key={i}
                        onClick={() => handleScaleAnswer(opt.score)}
                        className="w-full text-center p-4 rounded-xl border border-gray-100 bg-gray-50 hover:bg-green-50 hover:border-green-300 text-gray-700 transition-colors shadow-sm active:bg-green-100"
                      >
                        {opt.label}
                      </button>
                    ))
                  )}
                </div>
              </div>
            </div>
          </div>
        );
      }

      if (step === 'result' && result) {
        const kyoData = resultData.kyojitsu[result.kyojitsu.type];
        const kanData = resultData.kannetsu[result.kannetsu.type];
        const activeKiketsusui = Object.keys(result.kiketsusui).map(key => resultData.kiketsusui[key]);

        return (
          <div className="min-h-screen bg-[#f9f8f4] py-10 px-4 font-sans">
            <div className="max-w-2xl mx-auto space-y-6">
              
              <div className="text-center mb-8">
                <h1 className="text-2xl font-bold text-green-900">あなたの体質診断結果</h1>
              </div>

              <div className="bg-white rounded-2xl shadow-sm p-6 border border-[#e8e6df]">
                <h2 className="text-sm font-bold text-gray-500 mb-2 border-b pb-2">エネルギーの量（虚実）</h2>
                <div className="text-center py-4">
                  <span className="text-3xl font-bold text-green-800 tracking-widest">{kyoData.title}</span>
                </div>
                
                <ScoreBar 
                  score={result.kyojitsu.score} 
                  min={-16} max={16} 
                  leftLabel="虚証 (-)" rightLabel="実証 (+)" centerLabel="中間証"
                  leftColor="#93c5fd" rightColor="#fca5a5"
                />

                <p className="text-gray-700 text-sm leading-relaxed bg-gray-50 p-4 rounded-xl">
                  {kyoData.short}
                </p>
                <Accordion data={kyoData} />
              </div>

              <div className="bg-white rounded-2xl shadow-sm p-6 border border-[#e8e6df]">
                <h2 className="text-sm font-bold text-gray-500 mb-2 border-b pb-2">体の熱バランス（寒熱）</h2>
                <div className="text-center py-4">
                  <span className="text-3xl font-bold text-orange-700 tracking-widest">{kanData.title}</span>
                </div>

                <ScoreBar 
                  score={result.kannetsu.score} 
                  min={-10} max={10} 
                  leftLabel="寒証 (-)" rightLabel="熱証 (+)" centerLabel="平証"
                  leftColor="#93c5fd" rightColor="#fca5a5"
                />

                <p className="text-gray-700 text-sm leading-relaxed bg-gray-50 p-4 rounded-xl">
                  {kanData.short}
                </p>
                <Accordion data={kanData} />
              </div>

              {activeKiketsusui.length > 0 && (
                <div className="bg-white rounded-2xl shadow-sm p-6 border border-[#e8e6df]">
                  <h2 className="text-sm font-bold text-gray-500 mb-4 border-b pb-2">巡りの状態（気血水）</h2>
                  <div className="space-y-6">
                    {activeKiketsusui.map((item, idx) => (
                      <div key={idx} className="border-l-4 border-green-600 pl-4 py-1">
                        <h3 className="text-xl font-bold text-green-900 mb-2">{item.title}</h3>
                        <p className="text-gray-700 text-sm leading-relaxed mb-2">
                          {item.short}
                        </p>
                        <Accordion data={item} />
                      </div>
                    ))}
                  </div>
                </div>
              )}

              <div className="pt-8 pb-12 text-center">
                <button 
                  onClick={handleStart}
                  className="px-8 py-3 bg-white border-2 border-green-700 text-green-800 font-bold rounded-full hover:bg-green-50 transition-colors shadow-sm"
                >
                  最初からやり直す
                </button>
              </div>

            </div>
          </div>
        );
      }

      return null;
    }

    // --- ReactをDOMにレンダリング ---
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
