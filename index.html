    // --- UI Components ---

    const Accordion = ({ title, children, defaultOpen = false, icon = null }) => {
      const [isOpen, setIsOpen] = useState(defaultOpen);
      return (
        <div className="mb-4 border border-emerald-200 rounded-xl overflow-hidden bg-white shadow-sm">
          <button
            onClick={() => setIsOpen(!isOpen)}
            className="w-full flex justify-between items-center p-4 bg-emerald-50 text-emerald-900 font-medium hover:bg-emerald-100 transition-colors text-left"
          >
            <span className="flex items-center gap-2">
              {icon && <span className="text-emerald-600">{icon}</span>}
              {title}
            </span>
            {isOpen ? <ChevronUp size={20} className="text-emerald-600" /> : <ChevronDown size={20} className="text-emerald-600" />}
          </button>
          {isOpen && <div className="p-4 md:p-6 text-gray-700 leading-relaxed bg-white">{children}</div>}
        </div>
      );
    };

    const ProgressBar = ({ current, total }) => {
      const percentage = (current / total) * 100;
      return (
        <div className="w-full mb-6">
          <div className="flex justify-between text-sm text-emerald-700 mb-2 font-medium">
            <span>進行状況</span>
            <span>{current} / {total} 問</span>
          </div>
          <div className="h-3 w-full bg-emerald-100 rounded-full overflow-hidden">
            <div
              className="h-full bg-emerald-500 rounded-full transition-all duration-500 ease-out"
              style={{ width: `${percentage}%` }}
            />
          </div>
        </div>
      );
    };


    // --- Main Application ---

    const App = () => {
      const [view, setView] = useState('home'); // 'home', 'question', 'result', 'history', 'shoDetail'
      const [answers, setAnswers] = useState({});
      const [currentQuestionIndex, setCurrentQuestionIndex] = useState(0);
      const [result, setResult] = useState(null);
      const [history, setHistory] = useState([]);
      const [activeDetail, setActiveDetail] = useState(null);
      
      useEffect(() => {
        // 履歴をローカルストレージから読み込む
        const saved = localStorage.getItem('waragi_history');
        if (saved) {
          try {
            const parsed = JSON.parse(saved);
            // ★古いバージョンで作成された互換性のないデータを弾く安全対策
            const validHistory = parsed.filter(item => 
              item && 
              item.result && 
              item.result.types && 
              item.result.mainShoKey
            );
            setHistory(validHistory);
          } catch (e) {
            console.error("履歴の読み込みに失敗しました", e);
          }
        }
      }, []);

      const saveHistory = (newResult) => {
        const newEntry = {
          id: Date.now(),
          date: new Date().toLocaleString('ja-JP'),
          result: newResult
        };
        const updatedHistory = [newEntry, ...history].slice(0, 10); // 最新10件を保存
        setHistory(updatedHistory);
        localStorage.setItem('waragi_history', JSON.stringify(updatedHistory));
      };

      const startDiagnosis = () => {
        setAnswers({});
        setCurrentQuestionIndex(0);
        setResult(null);
        setView('question');
        window.scrollTo(0, 0);
      };

      // --- 計算ロジック ---
      const calculateResult = () => {
        let kyojitsuScore = 0;
        let kannetsuScore = 0;
        const kiketsusuiCount = { kikyo: 0, kitai: 0, kigyaku: 0, oketsu: 0, kekkyo: 0, suitai: 0 };

        QUESTIONS.forEach(q => {
          const ans = answers[q.id];
          if (ans === undefined) return;

          if (q.type === 'kyojitsu') {
            const val = parseInt(ans);
            if (q.target === 'jitsu') {
              kyojitsuScore += val;
            } else {
              // 虚証の質問は値の符号を反転させる
              kyojitsuScore -= val; 
            }
          } else if (q.type === 'kannetsu') {
            const val = parseInt(ans);
            if (q.target === 'netsu') {
              kannetsuScore += val;
            } else {
              // 寒証の質問は値の符号を反転させる
              kannetsuScore -= val;
            }
          } else if (q.type === 'kiketsusui') {
            // 複数選択（opt.idで保存されているので、keyに変換してカウント）
            if (Array.isArray(ans)) {
              ans.forEach(optId => {
                const option = q.options.find(o => o.id === optId);
                if (option && !option.isNone) {
                  kiketsusuiCount[option.key]++;
                }
              });
            }
          }
        });

        // --- 判定 ---
        // 虚実
        let kyojitsuType = 'chukan';
        if (kyojitsuScore >= 4) kyojitsuType = 'jitsu';
        else if (kyojitsuScore <= -4) kyojitsuType = 'kyo';

        // 寒熱
        let kannetsuType = 'hei';
        if (kannetsuScore >= 3) kannetsuType = 'netsu';
        else if (kannetsuScore <= -3) kannetsuType = 'kan';

        // 気血水の異常判定 (2つ以上、瘀血は3つ以上)
        const activeKiketsusui = {};
        for (const [key, count] of Object.entries(kiketsusuiCount)) {
          if (key === 'oketsu' && count >= 3) {
            activeKiketsusui[key] = count;
          } else if (key !== 'oketsu' && count >= 2) {
            activeKiketsusui[key] = count;
          }
        }

        // 気血水のトップを決定
        let topKiketsusui = null;
        if (Object.keys(activeKiketsusui).length > 0) {
          let maxScore = -999;
          const priorities = { kikyo: 6, kitai: 5, kigyaku: 4, kekkyo: 3, oketsu: 2, suitai: 1 };
          
          for (const key of Object.keys(activeKiketsusui)) {
            // 瘀血のみスコアを -1 して判定
            const evalScore = key === 'oketsu' ? activeKiketsusui[key] - 1 : activeKiketsusui[key];
            
            if (evalScore > maxScore) {
              maxScore = evalScore;
              topKiketsusui = key;
            } else if (evalScore === maxScore) {
              // 同点時は優先度で決定
              if (priorities[key] > priorities[topKiketsusui]) {
                topKiketsusui = key;
              }
            }
          }
        }

        // メインの証を決定（レシピ等の表示に使用）
        let mainShoKey = '';
        if (topKiketsusui) {
          mainShoKey = topKiketsusui;
        } else {
          // 気血水に異常がない場合、虚実・寒熱から0から一番遠いもの
          const devKyojitsu = Math.abs(kyojitsuScore);
          const devKannetsu = Math.abs(kannetsuScore);
          
          if (devKyojitsu === 0 && devKannetsu === 0) {
            mainShoKey = 'hei'; // 完全に0なら平証
          } else if (devKyojitsu > devKannetsu) {
            mainShoKey = kyojitsuScore > 0 ? 'jitsu' : 'kyo';
          } else if (devKannetsu > devKyojitsu) {
            mainShoKey = kannetsuScore > 0 ? 'netsu' : 'kan';
          } else {
            // 同点時の優先度: 虚証 ＞ 寒証 ＞ 熱証 ＞ 実証 ＞ 虚実中間証 ＞ 平証
            const kK = kyojitsuScore > 0 ? 'jitsu' : 'kyo';
            const kH = kannetsuScore > 0 ? 'netsu' : 'kan';
            const p = { kyo: 6, kan: 5, netsu: 4, jitsu: 3, chukan: 2, hei: 1 };
            mainShoKey = p[kK] > p[kH] ? kK : kH;
          }
        }

        const calculatedResult = {
          scores: { kyojitsu: kyojitsuScore, kannetsu: kannetsuScore },
          types: { kyojitsu: kyojitsuType, kannetsu: kannetsuType },
          activeKiketsusui,
          topKiketsusui,
          mainShoKey
        };

        setResult(calculatedResult);
        saveHistory(calculatedResult);
        setView('result');
        window.scrollTo(0, 0);
      };

      const handleSingleAnswer = (val) => {
        setAnswers(prev => ({ ...prev, [QUESTIONS[currentQuestionIndex].id]: val }));
        handleNext();
      };

      const handleMultipleAnswerToggle = (optId, isNone) => {
        const qId = QUESTIONS[currentQuestionIndex].id;
        setAnswers(prev => {
          const currentAns = Array.isArray(prev[qId]) ? prev[qId] : [];
          let newAns;
          
          if (isNone) {
            // 特になしを選んだら他をクリア
            newAns = currentAns.includes(optId) ? [] : [optId];
          } else {
            // 他を選んだら「特になし」のIDをクリア (ここでは '-none' で終わるもの)
            newAns = currentAns.filter(id => !id.endsWith('-none'));
            if (newAns.includes(optId)) {
              newAns = newAns.filter(id => id !== optId); // toggle off
            } else {
              newAns.push(optId); // toggle on
            }
          }
          return { ...prev, [qId]: newAns };
        });
      };

      const handleNext = () => {
        if (currentQuestionIndex < QUESTIONS.length - 1) {
          setCurrentQuestionIndex(prev => prev + 1);
          window.scrollTo(0, 0);
        } else {
          calculateResult();
        }
      };

      const handlePrev = () => {
        if (currentQuestionIndex > 0) {
          setCurrentQuestionIndex(prev => prev - 1);
        }
      };

      const shareResult = async () => {
        if (!result) return;
        const text = `私の和らぎ体質診断のメインの証は「${SHO_DATA[result?.mainShoKey]?.name || '不明'}」でした！あなたも診断してみませんか？`;
        if (navigator.share) {
          try {
            await navigator.share({ title: '和らぎ体質診断', text: text, url: window.location.href });
          } catch (err) {
            console.log('共有キャンセルまたはエラー', err);
          }
        } else {
          // クリップボードにコピー
          const textArea = document.createElement("textarea");
          textArea.value = text;
          document.body.appendChild(textArea);
          textArea.select();
          try {
            document.execCommand('copy');
            alert("結果をクリップボードにコピーしました！");
          } catch (err) {
            console.error('コピー失敗', err);
          }
          document.body.removeChild(textArea);
        }
      };


      // --- Render Views ---

      if (view === 'home') {
        return (

                  <div>
                    <h3 className="font-bold text-rose-800 mb-1">【重要】医療安全の徹底について</h3>
                    <p className="text-rose-900 text-sm leading-relaxed font-medium">
                      診断結果に関わらず、容態が急変したり、強い違和感がある場合は、本アプリの診断を待たず、ためらわずに直ちに医療機関を受診してください。

                  <BookOpen size={20} className="text-emerald-600"/>

                <div className="p-4 md:p-6 text-sm md:text-base text-gray-700 leading-loose">
                  <p>東洋医学の診断は、本来「望・聞・問・切」という<strong>「四診（ししん）」</strong>の4つが揃って完成します。</p>
                  <ul className="list-disc pl-5 space-y-2 bg-emerald-50/50 p-4 rounded-lg mt-3">
                    <li><strong>望診（ぼうしん）：</strong> 視覚的情報（顔色や舌の状態など）</li>
                    <li><strong>聞診（ぶんしん）：</strong> 聴覚・嗅覚的情報（声のトーンやにおい）</li>
                    <li><strong className="text-emerald-700 border-b border-emerald-300">問診（もんしん）： 対話による情報（※本アプリの範囲）</strong></li>
                    <li><strong>切診（せつしん）：</strong> 触覚的情報（脈や腹部の触診）</li>
                  </ul>
                  <p className="mt-4 font-medium text-gray-800">
                    ⚠️ 本アプリは「問診」をベースとしたセルフチェックツールです。四診のすべてを網羅した医師の診断とは異なるため、あくまで一つの目安として、日々の観察（日記）のようにご活用ください。体質は季節や環境で変わる生き物です。何度でも無料でお試しいただけます。
                  </p>
                </div>
              </div>

              <Accordion title="開発のストーリー・製作者の想い" defaultOpen={true} icon={<Info size={20}/>}>
                <div className="space-y-4 text-sm md:text-base text-gray-700 leading-loose">
                  <p>
                    <strong>皮膚科での違和感：</strong><br/>
                    「気になる」と伝えただけで、驚くほど簡単に処方された防風通聖散。その手軽さに、一人の患者として「本当にこれでいいの？」という小さな疑問を抱いたのが始まりでした。
                  </p>
                  <p>
                    <strong>医学部での学び：</strong><br/>
                    その後、医学部医学科へ進学し、東洋医学研究会で研鑽を積む中で、漢方薬にも明確な<strong>副作用</strong>が存在することを知りました。本来、漢方は<strong>「証（しょう）」</strong>という個々の体質を見極めて選ぶべきものであり、合わない「証」の人に処方すると、症状を悪化させるリスクがあるのです。
                  </p>
                  <p>
                    <strong>解決策としてのアプリ：</strong><br/>
                    「証」にはそれぞれ合う食材が存在し、日々の食事から整えることができます。病院に行くほどではない「未病」の状態を、この和漢の知恵で救えるのではないか。医学部生としての責任をもってロジックを監修し誕生したのが、この「和らぎ体質診断」です。
                  </p>
                </div>
              </Accordion>

            </main>
          </div>
        );
      }

      if (view === 'question') {
        const q = QUESTIONS[currentQuestionIndex];
        const isMultiple = q.type === 'kiketsusui';
        const currentAns = answers[q.id];
        const canProceedMultiple = isMultiple && Array.isArray(currentAns) && currentAns.length > 0;

        return (
          <div className="min-h-screen bg-[#fcfaf7] text-gray-800 font-sans">
            <header className="bg-white border-b border-emerald-100 sticky top-0 z-10 px-4 py-3">
              <div className="max-w-2xl mx-auto flex items-center">

                </button>
                <h1 className="text-lg font-bold text-emerald-800">体質を分析中...</h1>
              </div>
            </header>

            <main className="max-w-2xl mx-auto px-4 py-8">
              <ProgressBar current={currentQuestionIndex + 1} total={QUESTIONS.length} />

              <div className="bg-white rounded-2xl shadow-sm border border-emerald-100 p-6 md:p-8 mb-8 min-h-[300px] flex flex-col justify-center">
                <h2 className="text-xl md:text-2xl font-bold text-gray-800 mb-8 leading-relaxed flex items-start">
                  <span className="text-emerald-500 mr-3 text-2xl font-serif">Q{currentQuestionIndex + 1}.</span>
                  <span>{q.text}</span>
                </h2>

                {!isMultiple && (
                  <div className="space-y-3">
                    {SINGLE_CHOICES.map(choice => (
                      <button
                        key={choice.value}
                        onClick={() => handleSingleAnswer(choice.value)}
                        className="w-full text-left px-6 py-4 rounded-xl border-2 border-emerald-50 hover:border-emerald-400 hover:bg-emerald-50 transition-all font-medium text-gray-700 flex items-center justify-between group"
                      >
                        <span>{choice.label}</span>
                        <span className="w-4 h-4 rounded-full border-2 border-emerald-200 group-hover:border-emerald-500 group-hover:bg-emerald-100"></span>
                      </button>
                    ))}
                  </div>
                )}

                {isMultiple && (
                  <div className="space-y-3">
                    {q.options.map(opt => {
                      const isSelected = Array.isArray(currentAns) && currentAns.includes(opt.id);
                      return (
                        <button
                          key={opt.id}
                          onClick={() => handleMultipleAnswerToggle(opt.id, opt.isNone)}
                          className={`w-full text-left px-5 py-4 rounded-xl border-2 transition-all font-medium flex items-center justify-start gap-3
                            ${isSelected 
                              ? 'border-emerald-500 bg-emerald-50 text-emerald-900' 
                              : 'border-gray-100 hover:border-emerald-300 text-gray-700'}`}
                        >
                          <div className={`w-5 h-5 rounded flex-shrink-0 flex items-center justify-center border
                            ${isSelected ? 'bg-emerald-500 border-emerald-500' : 'bg-white border-gray-300'}`}>
                            {isSelected && <svg className="w-3 h-3 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={3} d="M5 13l4 4L19 7" /></svg>}
                          </div>
                          <span className="leading-snug">{opt.text}</span>
                        </button>
                      );
                    })}
                  </div>
                )}
              </div>

              <div className="flex justify-between items-center">
                <div>
                  {currentQuestionIndex > 0 && (
                    <button
                      onClick={handlePrev}
                      className="flex items-center gap-2 text-gray-500 hover:text-emerald-700 font-medium px-4 py-2"
                    >
                      <ArrowLeft size={18} /> 前の質問に戻る
                    </button>
                  )}
                </div>
                
                {isMultiple && (
                  <button
                    onClick={handleNext}
                    disabled={!canProceedMultiple}
                    className={`font-bold py-3 px-8 rounded-full shadow transition-all
                      ${canProceedMultiple 
                        ? 'bg-emerald-600 hover:bg-emerald-700 text-white hover:shadow-lg' 
                        : 'bg-gray-200 text-gray-400 cursor-not-allowed'}`}
                  >
                    {currentQuestionIndex === QUESTIONS.length - 1 ? '結果を見る' : '次の質問へ'}
                  </button>
                )}
              </div>
            </main>
          </div>
        );
      }

      if (view === 'shoDetail' && activeDetail) {
        const shoInfo = SHO_DATA[activeDetail];
        return (
          <div className="min-h-screen bg-[#fcfaf7] text-gray-800 font-sans pb-24">
            <header className="bg-white border-b border-emerald-100 sticky top-0 z-10 px-4 py-3 shadow-sm">
              <div className="max-w-3xl mx-auto flex items-center">
                <button onClick={() => setView('result')} className="text-gray-500 hover:text-emerald-700 font-medium flex items-center gap-1">
                  <ArrowLeft size={20} /> 結果画面に戻る
                </button>
              </div>
            </header>
            <main className="max-w-3xl mx-auto px-4 py-8">
              <h2 className="text-2xl font-bold text-emerald-800 mb-6">{shoInfo?.name} について</h2>
              
              <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 md:p-8 mb-8">
                <h3 className="text-lg font-bold text-gray-800 mb-4 border-b pb-2 flex items-center gap-2">
                  <Info size={20} className="text-emerald-600" /> 証の説明
                </h3>
                <div className="whitespace-pre-line text-gray-700 leading-loose text-base md:text-lg">
                  {shoInfo?.detail || ''}
                </div>
              </div>

              <div className="bg-amber-50 rounded-2xl shadow-sm border border-amber-100 p-6 md:p-8">
                <h3 className="text-lg font-bold text-amber-800 mb-4 flex items-center gap-2 border-b border-amber-200 pb-2">
                  <AlertTriangle size={20} /> 合わない漢方薬の注意点
                </h3>
                <div className="text-gray-700 leading-loose whitespace-pre-line text-base md:text-lg">
                  {shoInfo?.kumpo === 'この状態を維持することが一番の健康法です。漢方薬を頼るよりも、日々の食事と睡眠で今のバランスを保ちましょう。' ? (
                    <p>{shoInfo.kumpo}</p>
                  ) : (
                    <div dangerouslySetInnerHTML={{ __html: shoInfo?.kumpo || '特にありません。' }} />
                  )}
                </div>
              </div>
            </main>
          </div>
        );
      }

      if (view === 'result' && result) {
        const mainSho = SHO_DATA[result?.mainShoKey] || {};
        const topKiketsusui = result?.topKiketsusui;

        const kyoJitsuPercent = Math.max(0, Math.min(100, (((result?.scores?.kyojitsu || 0) + 16) / 32) * 100));
        const kanNetsuPercent = Math.max(0, Math.min(100, (((result?.scores?.kannetsu || 0) + 10) / 20) * 100));

        return (
          <div className="min-h-screen bg-[#fcfaf7] text-gray-800 font-sans pb-24">
            <header className="bg-white border-b border-emerald-100 sticky top-0 z-10 px-4 py-3 shadow-sm">
              <div className="max-w-3xl mx-auto flex justify-between items-center">
                <button onClick={() => setView('home')} className="text-gray-500 hover:text-emerald-700 font-medium flex items-center gap-1">
                  <ArrowLeft size={20} /> トップへ戻る
                </button>
                <button onClick={shareResult} className="text-emerald-600 hover:text-emerald-800 font-medium flex items-center gap-1 bg-emerald-50 px-3 py-1.5 rounded-full">
                  <Share2 size={18} /> シェア
                </button>
              </div>
            </header>

            <main className="max-w-3xl mx-auto px-4 py-8">
              
              <div className="bg-gradient-to-br from-emerald-600 to-teal-500 rounded-2xl shadow-lg p-8 mb-10 text-center text-white relative overflow-hidden">
                <div className="absolute top-0 right-0 opacity-10 transform translate-x-1/4 -translate-y-1/4 text-9xl">🌿</div>
                <p className="text-sm font-medium mb-3 opacity-90 tracking-widest">今日を生き抜く一言</p>
                <h2 className="text-2xl md:text-3xl font-bold leading-relaxed whitespace-pre-line">
                  「{mainSho?.hitokoto || ''}」
                </h2>
              </div>

              <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 md:p-8 mb-8">
                <h3 className="text-xl font-bold text-emerald-800 mb-6 border-b pb-2 flex items-center gap-2">
                  <Activity size={20} className="text-emerald-600"/> あなたの体質
                </h3>
                
                <div className="mb-8">
                  <div className="flex justify-between items-end mb-2">
                    <span className="font-bold text-gray-700">虚実（体力・抵抗力）</span>
                    <button 
                      onClick={() => { setActiveDetail(result?.types?.kyojitsu); setView('shoDetail'); }}
                      className="text-emerald-700 font-bold bg-emerald-50 px-3 py-1 rounded-full text-sm border border-emerald-200 hover:bg-emerald-100 transition-colors underline underline-offset-2"
                    >
                      {SHO_DATA[result?.types?.kyojitsu]?.name || '不明'}
                    </button>
                  </div>
                  
                  <div className="relative pt-2 pb-4">
                    <div className="flex mb-2 items-center justify-between text-xs text-gray-500 font-medium">
                      <span>虚証</span>
                      <span>実証</span>
                    </div>
                    <div className="relative w-full h-2 bg-gray-200 rounded-full">
                      <div className="absolute top-0 left-1/2 w-0.5 h-3 -mt-0.5 bg-gray-400"></div>
                      <div 
                        className="absolute top-1/2 w-5 h-5 bg-white border-4 border-emerald-500 rounded-full shadow transform -translate-x-1/2 -translate-y-1/2 transition-all duration-500"
                        style={{ left: `${kyoJitsuPercent}%` }}
                      ></div>
                    </div>
                  </div>
                  <p className="text-sm text-gray-700 leading-relaxed bg-gray-50 p-3 rounded-lg">
                    {SHO_DATA[result?.types?.kyojitsu]?.summary || ''}
                  </p>
                </div>

                <div className="mb-8">
                  <div className="flex justify-between items-end mb-2">
                    <span className="font-bold text-gray-700">寒熱（熱バランス）</span>
                    <button 
                      onClick={() => { setActiveDetail(result?.types?.kannetsu); setView('shoDetail'); }}
                      className="text-orange-700 font-bold bg-orange-50 px-3 py-1 rounded-full text-sm border border-orange-200 hover:bg-orange-100 transition-colors underline underline-offset-2"
                    >
                      {SHO_DATA[result?.types?.kannetsu]?.name || '不明'}
                    </button>
                  </div>
                  
                  <div className="relative pt-2 pb-4">
                    <div className="flex mb-2 items-center justify-between text-xs text-gray-500 font-medium">
                      <span>寒証</span>
                      <span>熱証</span>
                    </div>
                    <div className="relative w-full h-2 bg-gray-200 rounded-full">
                      <div className="absolute top-0 left-1/2 w-0.5 h-3 -mt-0.5 bg-gray-400"></div>
                      <div 
                        className="absolute top-1/2 w-5 h-5 bg-white border-4 border-orange-500 rounded-full shadow transform -translate-x-1/2 -translate-y-1/2 transition-all duration-500"
                        style={{ left: `${kanNetsuPercent}%` }}
                      ></div>
                    </div>
                  </div>
                  <p className="text-sm text-gray-700 leading-relaxed bg-gray-50 p-3 rounded-lg">
                    {SHO_DATA[result?.types?.kannetsu]?.summary || ''}
                  </p>
                </div>

                <div>
                  <div className="flex justify-between items-end mb-2">
                    <span className="font-bold text-gray-700">気血水（巡りの異常）</span>
                    {topKiketsusui ? (
                      <button 
                        onClick={() => { setActiveDetail(topKiketsusui); setView('shoDetail'); }}
                        className="text-blue-700 font-bold bg-blue-50 px-3 py-1 rounded-full text-sm border border-blue-200 hover:bg-blue-100 transition-colors underline underline-offset-2"
                      >
                        {SHO_DATA[topKiketsusui]?.name || '不明'}
                      </button>
                    ) : (
                      <span className="text-gray-600 font-bold bg-gray-100 px-3 py-1 rounded-full text-sm border border-gray-200">
                        著明な異常なし
                      </span>
                    )}
                  </div>
                  
                  {topKiketsusui ? (
                    <p className="text-sm text-gray-700 leading-relaxed bg-gray-50 p-3 rounded-lg">
                      {SHO_DATA[topKiketsusui]?.summary || ''}
                    </p>
                  ) : (
                    <p className="text-sm text-gray-700 leading-relaxed bg-gray-50 p-3 rounded-lg">
                      現在、気・血・水の巡りに大きな滞りは見られません。この良い状態を保ちましょう。
                    </p>
                  )}
                </div>
              </div>

              <Accordion title="あなたの体質（証）について詳しく知る" icon={<Info size={20}/>} defaultOpen={false}>
                <div className="whitespace-pre-line text-gray-700 leading-loose">
                  {mainSho?.detail || ''}
                </div>
              </Accordion>

              <Accordion title="なぜこの診断結果が選ばれたの？（優先順位について）" icon={<BookOpen size={20}/>} defaultOpen={false}>
                <div className="space-y-4 text-sm md:text-base text-gray-700 leading-loose">
                  <p><strong>診断結果の優先順位について：</strong><br/>
                  東洋医学の視点から私たちの体は、絶えず変化する複雑なバランスの上に成り立っています。今回の診断では、あなたが回答した17問の問診に基づき、東洋医学の柱である「気・血・水（エネルギー・栄養・水分）」 と、「虚実・寒熱（体力の充実度と熱バランス）」の状態を総合的に分析しました。</p>
                  
                  <p><strong>なぜこの「証（しょう）」が選ばれたのか：</strong><br/>
                  体の中では、複数のサインが同時に出ていることが珍しくありません。しかし、あれもこれもと一度に手を広げるよりも、「今、最も根本的な原因となっているもの」から整えるのが、体調改善への一番の近道です。このアプリでは、以下の東洋医学的な優先順位に基づいて、あなたに今最も必要なアドバイスを厳選して表示しています。</p>
                  
                  <ul className="list-disc pl-5 space-y-2">
                    <li><strong>「気（エネルギー）」を最優先に</strong><br/>「気」は全ての生命活動のエンジンです。血や水の巡りに不安があっても、まずはエンジンの出力（気）を整えることで、他の巡りも自然とスムーズに動き出すと考えられています。</li>
                    <li><strong>「偏りの大きさ」に注目</strong><br/>理想的なバランス（0の状態）から最も大きく離れている要素は、体が発している「一番大きなSOS」です。その偏りを優先的にケアすることで、効率よく全体のバランスを取り戻すことができます。</li>
                    <li><strong>「補うこと」から始めましょう</strong><br/>もし「不足（虚）」と「過剰（実）」が同時に起きている場合、まずは足りないものを補い、体を温めることから始めるのが、東洋医学の安全で優しいルールです。</li>
                  </ul>
                  <p className="mt-4 bg-emerald-50 p-4 rounded-lg font-medium text-emerald-900">
                    一歩ずつ、整えていくために表示されている結果は、あなたの体が今、一番助けを求めている部分です。まずは今日提案されたおすすめの行動を一つ取り入れることから始めてみてください。一つのボタンを正しく押せば、連動して他の部分も良い方向へ回り始めますよ。
                  </p>
                </div>
              </Accordion>

              <Accordion title="今のあなたに向けたマインドセット" defaultOpen={false}>
                <div className="whitespace-pre-line text-gray-700 leading-loose text-lg font-medium">
                  {mainSho?.mindset || ''}
                </div>
              </Accordion>

              <div className="mb-8 mt-6">
                <h3 className="text-xl font-bold text-emerald-800 mb-4 border-l-4 border-emerald-500 pl-3">おすすめの食材</h3>
                <div className="bg-white p-6 rounded-2xl shadow-sm border border-emerald-100">
                  <p className="text-xl font-bold text-emerald-600 mb-4 pb-2 border-b border-emerald-50">
                    {mainSho?.ingredients || ''}
                  </p>
                  <p className="text-gray-700 leading-loose">
                    <strong>理由：</strong><br/>{mainSho?.ingredientsReason || ''}
                  </p>
                </div>
              </div>

              <Accordion title="おすすめのレシピ" defaultOpen={false} icon={<BookOpen size={20}/>}>
                <p className="text-sm text-gray-500 mb-4">レシピ名を押すと、材料や手順などの詳細が表示されます。</p>
                <div className="space-y-3">
                  {mainSho?.recipes && mainSho.recipes.map((recipe, index) => (
                    <details key={index} className="group bg-white border border-emerald-200 rounded-xl overflow-hidden shadow-sm">
                      <summary className="cursor-pointer p-4 font-bold text-emerald-800 hover:bg-emerald-50 transition-colors list-none flex justify-between items-center">
                        <span className="underline decoration-emerald-300 underline-offset-4">{recipe.name}</span>
                        <ChevronDown size={20} className="text-emerald-500 group-open:rotate-180 transition-transform"/>
                      </summary>
                      <div className="p-4 md:p-6 bg-emerald-50/30 border-t border-emerald-100 text-gray-700 space-y-4">
                        <div className="bg-white p-4 rounded-lg border border-emerald-100 shadow-sm">
                          <strong className="text-emerald-700 block mb-1">【このレシピの効果】</strong>
                          <p className="leading-relaxed">{recipe.effect}</p>
                        </div>
                        
                        <div className="grid md:grid-cols-2 gap-6">
                          <div>
                            <strong className="text-gray-800 block mb-2 border-b pb-1">材料</strong>
                            <p className="whitespace-pre-line text-sm leading-loose">{recipe.ingredients}</p>
                          </div>
                          <div>
                            <strong className="text-gray-800 block mb-2 border-b pb-1">作り方</strong>
                            <p className="whitespace-pre-line text-sm leading-loose">{recipe.steps}</p>
                          </div>
                        </div>
                        
                        <div className="mt-4 pt-4 border-t border-gray-200">
                          <strong className="text-gray-600 text-sm block mb-1">栄養成分表示</strong>
                          <p className="text-xs text-gray-500">{recipe.nutrition}</p>
                        </div>
                      </div>
                    </details>
                  ))}
                </div>
              </Accordion>

              <Accordion title="控えるべきこと・推奨する行動" defaultOpen={false} icon={<AlertTriangle size={20}/>}>
                <div className="grid md:grid-cols-2 gap-6">
                  {mainSho?.avoid && (
                    <div className="bg-rose-50 p-6 rounded-2xl border border-rose-100">
                      <h4 className="font-bold text-rose-800 mb-3 flex items-center gap-2">
                        <span className="bg-rose-200 text-rose-800 px-2 py-0.5 rounded text-sm">控えるべきこと</span>
                      </h4>
                      <p className="font-bold text-gray-800 mb-2">「{mainSho.avoid.title}」</p>
                      <p className="text-sm text-gray-700 leading-loose"><strong>理由：</strong> {mainSho.avoid.reason}</p>
                    </div>
                  )}
                  {mainSho?.recommend && (
                    <div className="bg-blue-50 p-6 rounded-2xl border border-blue-100">
                      <h4 className="font-bold text-blue-800 mb-3 flex items-center gap-2">
                        <span className="bg-blue-200 text-blue-800 px-2 py-0.5 rounded text-sm">推奨する行動</span>
                      </h4>
                      <p className="font-bold text-gray-800 mb-2">「{mainSho.recommend.title}」</p>
                      <p className="text-sm text-gray-700 leading-loose"><strong>理由：</strong> {mainSho.recommend.reason}</p>
                    </div>
                  )}
                </div>
              </Accordion>

              <Accordion title="合わない漢方薬の注意点（必読）" icon={<AlertTriangle size={20} className="text-amber-500"/>} defaultOpen={false}>
                <div className="text-sm text-gray-700 leading-loose whitespace-pre-line bg-amber-50/50 p-4 rounded-lg">
                  <div dangerouslySetInnerHTML={{ __html: mainSho?.kumpo || '' }} />
                </div>
              </Accordion>

              <Accordion title="過去の履歴を見る" icon={<Clock size={20}/>} defaultOpen={false}>
                {history.length === 0 ? (
                  <p className="text-gray-500 text-sm">過去の履歴はありません。</p>
                ) : (
                  <div className="space-y-3 text-sm">
                    {history.map((item) => (
                      <div key={item.id} className="p-4 bg-gray-50 rounded-lg border border-gray-200">
                        <p className="font-bold text-emerald-800 mb-2">{item.date} の診断結果</p>
                        <div className="space-y-1 text-gray-700">
                          <p><strong>虚実：</strong> {SHO_DATA[item.result?.types?.kyojitsu]?.name || '不明'}</p>
                          <p><strong>寒熱：</strong> {SHO_DATA[item.result?.types?.kannetsu]?.name || '不明'}</p>
                          <p><strong>気血水：</strong> {item.result?.topKiketsusui ? SHO_DATA[item.result.topKiketsusui]?.name : '著明な異常なし'}</p>
                        </div>
                      </div>
                    ))}
                  </div>
                )}
              </Accordion>

              <div className="mt-12 space-y-4">
                <a 
                  href="https://forms.gle/obJsGz62U8nXXA9o9" 
                  target="_blank" 
                  rel="noopener noreferrer"
                  className="w-full flex justify-center items-center gap-2 bg-gray-800 text-white font-bold py-4 rounded-full hover:bg-gray-700 transition-colors shadow-sm"
                >
                  アンケートに回答する <ExternalLink size={18} />
                </a>

                <div className="text-center pt-8 border-t border-gray-200 mt-8">
                  <h4 className="font-bold text-gray-700 mb-2">パートナー募集</h4>
                  <p className="text-sm text-gray-600 mb-2 leading-relaxed">
                    和らぎ体質診断を共に広めてくださる方、事業での活用をご検討の方は、下記までご連絡ください。
                  </p>
                  
                  <div className="flex justify-center items-center gap-2 mt-3">
                    <span className="text-emerald-700 font-bold tracking-wide select-all bg-emerald-50 px-4 py-2 rounded-lg border border-emerald-100">
                      wakanshindan1111@gmail.com
                    </span>
                    <button 
                      onClick={() => {
                        const textArea = document.createElement("textarea");
                        textArea.value = "wakanshindan1111@gmail.com";
                        document.body.appendChild(textArea);
                        textArea.select();
                        try {
                          document.execCommand('copy');
                          alert("メールアドレスをコピーしました！");
                        } catch (err) {
                          console.error('コピー失敗', err);
                        }
                        document.body.removeChild(textArea);
                      }}
                      className="p-2 bg-white border border-gray-200 rounded-lg hover:bg-gray-100 transition-colors shadow-sm flex items-center gap-1"
                      title="メールアドレスをコピー"
                    >
                      <Copy size={18} className="text-gray-600"/>
                    </button>
                  </div>
                </div>
              </div>
              
            </main>
          </div>
        );
      }

      if (view === 'history') {
        return (
          <div className="min-h-screen bg-[#fcfaf7] text-gray-800 font-sans">
            <header className="bg-white border-b border-emerald-100 sticky top-0 z-10 px-4 py-3">
              <div className="max-w-2xl mx-auto flex items-center">
                <button onClick={() => setView('home')} className="text-gray-500 hover:text-emerald-700 mr-4">
                  <ArrowLeft size={24} />
                </button>
                <h1 className="text-lg font-bold text-emerald-800 flex items-center gap-2">
                  <Clock size={20} /> 過去の履歴
                </h1>
              </div>
            </header>

            <main className="max-w-2xl mx-auto px-4 py-8">
              <p className="text-gray-600 mb-6 text-sm">
                ※最新10件の診断結果がお使いのブラウザに保存されています。
              </p>
              
              {history.length === 0 ? (
                <div className="bg-white p-10 text-center rounded-2xl border border-gray-200">
                  <p className="text-gray-500">まだ診断履歴がありません。<br/>トップページから診断をスタートしてください。</p>
                  <button 
                    onClick={() => setView('home')}
                    className="mt-6 bg-emerald-600 text-white px-6 py-2 rounded-full font-bold"
                  >
                    トップへ戻る
                  </button>
                </div>
              ) : (
                <div className="space-y-4">
                  {history.map((item) => (
                    <div key={item.id} className="bg-white p-5 rounded-2xl border border-emerald-100 shadow-sm">
                      <p className="font-bold text-emerald-800 mb-3 border-b border-emerald-50 pb-2">{item.date} の診断結果</p>
                      <div className="space-y-2 text-gray-700 text-sm">
                        <p><strong>虚実（体力）：</strong> {SHO_DATA[item.result?.types?.kyojitsu]?.name || '不明'}</p>
                        <p><strong>寒熱（熱バランス）：</strong> {SHO_DATA[item.result?.types?.kannetsu]?.name || '不明'}</p>
                        <p><strong>気血水（巡り）：</strong> {item.result?.topKiketsusui ? SHO_DATA[item.result.topKiketsusui]?.name : '著明な異常なし'}</p>
                      </div>
                    </div>
                  ))}
                </div>
              )}
            </main>
          </div>
        );
      }

      return null; // fallback
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
